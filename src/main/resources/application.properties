spring.application.name=cityEvents
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.datasource.url=jdbc:mariadb://localhost:3307/cityEvents_database
spring.datasource.username=cityEvents_user
spring.datasource.password=cityEvents_password
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect