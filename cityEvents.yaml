      summary: Lista de reseñas.
      description: |
        Nos devuelve una lista completa con todas las reseñas de los eventos, realizadas por los usuarios. 
        Se puede realizar búsqueda tanto de la lista completa como realizar un filtrado tanto por el nombre de usuario del que ha hecho la publicación como por el nombre del evento al que corresponden las reseñas.
      parameters:
        - name: username
          in: query
          description: Filtra todas las reseñas realizadas por un usuario a través de su username.
          required: false
          schema:
            type: string
        - name: eventName
          in: query
          description: Filtra por el nombre del evento sobre el cual se quieren conocer todas sus reseñas
          required: false
          schema:
            type: string
        - name: rate
          in: query
          description: Filtra las reseñas con una valoración superior a la filtrada.
          required: false
          schema:
            type: number
            format: float
      responses:
