components:
  schemas:
    Event:
      allOf:
        - $ref: '#/components/schemas/EventInDto'
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador del evento
        availability:
          type: boolean
          default: true
          description: Identificado si hay entradas disponibles para el evento
      example:
        id: 1
        name: Concierto Extremoduro
        description: Concierto última gira de Extremoduro
        eventDate: 2025-02-04
        category: Concierto
        capacity: 27.000
        price: 30.0
        availability: true
    EventInDto:
      type: object
      properties:
        name:
          type: string
          description: Nombre del evento
        description:
          type: string
          description: Descripción del evento
        eventDate:
          type: string
          format: date
          description: Fecha en la que tendrá lugar el evento
        category:
          type: string
          description: Tipo de evento
        capacity:
          type: number
          format: int32
          description: Capacidad de aforo del evento
        price:
          type: number
          format: float
          description: Coste del acceso al evento
      example:
        name: Concierto Extremoduro
        description: Concierto última gira de Extremoduro
        eventDate: 2025-02-04
        category: Concierto
        capacity: 27.000
        price: 30.0
    EventOutDto:
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador del evento
        name:
          type: string
          description: Nombre del evento
        eventDate:
          type: string
          format: date
          description: Fecha en la que tendrá lugar el evento
        category:
          type: string
          description: Tipo de evento
        price:
          type: number
          format: float
          description: Coste del acceso al evento
      example:
        id: 1
        name: Concierto Extremoduro
        eventDate: 2025-02-04
        category: Concierto
        price: 30
    LocationOutDto:
      type: object
      properties:
        id:
          type: number
          format: int64
          description: Identificador de la localización
        name:
          type: string
          description: Nombre de la localización
        description:
          type: string
          description: Descripción de la localización
        category:
          type: string
          description: Tipo de evento
        disabledAccess:
          type: boolean
          description: Indica si tiene acceso para persona discapacitadas
      example:
        id: 1
        name: Teatro Principal
        description: Teatro más importante de la ciudad de Zaragoza.
        category: Teatro
        disabledAccess: true
    LocationInDto:
      type: object
      properties:
        name:
          type: string
          description: Nombre de la localización
        description:
          type: string
          description: Descripción de la localización
        category:
          type: string
          description: Tipo de evento
        streetLocated:
          type: string
          description: Calle en la que se encuentra situada la localización
        postalCode:
          type: number
          format: double
          description: Número de código postal de la localización
        registerDate:
          type: string
          format: date
          description: Fecha en la que se registra la localización nueva
        disabledAccess:
          type: boolean
          description: Indica si tiene acceso para persona discapacitadas
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
      example:
        name: Teatro Principal
        description: Teatro más importante de la ciudad de Zaragoza.
        category: Teatro
        streetLocated: Coso
        postalCode: 5001
        registerDate: 2026-01-13
        disabledAcces: true
        longitude: 34.0800397
        latitude: -0.42698239
