openapi: 3.0.1
info:
  title: CityEvents
  description: API informativa de los eventos de tu ciudad.
  version: 1.0.0
servers:
  - url: 'https://cityEvents.com'
paths:
  /events:
    get:
      summary: Lista de eventos
      description: | 
        Nos devuelve una lista completa con todos los elementos. 
        Se puede realizar búsqueda tanto de la lista completa como realizar un filtrado tanto por categoría evento como por nombre de la localización donde tiene lugar el evento.
      parameters:
        - name: category
          in: query
          description: Filtra por categoría del evento
          required: false
          schema:
            type: string
        - name: locationName
          in: query
          description: Filtra por nombre de la localización del evento
          required: false
          schema:
            type: string
        - name: price
          in: query
          description: Filtra por precio inferior o igual al parámetro y los ordena ascendentemente
          required: false
          schema:
            type: number
            format: float
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventOutDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Registrar evento
      description: Nos permite registrar un nuevo evento en nuestra base de datos.
      requestBody:
        description: Los datos del nuevo evento
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInDto'
      responses:
        '201':
          description: Evento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /events/{id}:
    get:
      summary: Vista de un evento
      description: Devuelve la vista mucho más detallada de un evento en concreto. Búsqueda filtrada por Id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    put:
      summary: Editar un evento
      description: Nos permite modificar, por "Id", los datos de un evento en nuestra base de datos.
      requestBody:
        description: Los datos del nuevo evento. Son los que sobreescribiremos sobre el antiguo.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventInDto'
      responses:
        '200':
          description: Evento registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    delete:
      summary: Borrar evento
      description: Permite eliminar un evento, por "Id", de la base de datos.
      responses:
        '204':
          description: Evento eliminado de la base de datos. (No devuelve ningún dato).
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /locations:
    get:
      summary: Lista de localizaciones
      description: |
        Nos devuelve una lista completa con todas las localizaciones en las que se celebran eventos.
        Se puede realizar búsqueda tanto de la lista completa como realizar un filtrado tanto por categoría evento como por las localizaciones accesibles para gente con discapacidad.
      parameters:
        - name: disabledAccess
          in: query
          description: Filtra por localizaciones que dispongan de acceso para personas con alguna discapacidad.
          required: false
          schema:
            type: boolean
        - name: category
          in: query
          description: Filtra las localizaciones por su categoría
          required: false
          schema:
            type: string
        - name: postalCode
          in: query
          description: Filtra las localizacione por el número de código postal
          schema:
            type: number
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationOutDto'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      summary: Registrar localización
      description: Permite registrar una localización en nuestra base de datos.
      requestBody:
        description: Los datos de la nueva localización
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationInDto'
      responses:
        '201':
          description: Localización registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
